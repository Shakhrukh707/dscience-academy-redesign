
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DScience Academy | Future of IT</title>
    <script>
      (() => {
        try {
          localStorage.removeItem('dscience-theme');
        } catch (error) {}
        document.documentElement.classList.remove('dark');
        document.documentElement.classList.add('light');
        document.documentElement.style.colorScheme = 'light';
      })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        scroll-behavior: smooth;
        background: radial-gradient(circle at top, rgba(59, 130, 246, 0.08), transparent 28%), linear-gradient(180deg, #FFFFFF 0%, #F8FAFC 55%, #EFF6FF 100%);
        color: #0F172A;
      }
      html.dark body {
        background: radial-gradient(circle at top, rgba(59, 130, 246, 0.14), transparent 30%), linear-gradient(180deg, #030712 0%, #020617 58%, #050816 100%);
        color: #F8FAFC;
      }
      .gradient-text {
        background: linear-gradient(to right, #2563EB, #4F46E5, #7C3AED);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      html.dark .gradient-text {
        background: linear-gradient(to right, #60A5FA, #818CF8, #C084FC);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .glass {
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid rgba(148, 163, 184, 0.18);
        box-shadow: 0 18px 45px -24px rgba(15, 23, 42, 0.16);
      }
      html.dark .glass {
        background: rgba(2, 6, 23, 0.72);
        border: 1px solid rgba(148, 163, 184, 0.14);
        box-shadow: 0 22px 50px -26px rgba(0, 0, 0, 0.72);
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #F8FAFC;
      }
      html.dark ::-webkit-scrollbar-track {
        background: #020617;
      }
      ::-webkit-scrollbar-thumb {
        background: #CBD5E1;
        border-radius: 4px;
      }
      html.dark ::-webkit-scrollbar-thumb {
        background: #334155;
      }
    </style>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
